spring:
  application:
    name: cleanops-backend
  datasource:
    url: ${CLEANOPS_DB_URL:jdbc:postgresql://localhost:5432/cleanops}
    username: ${CLEANOPS_DB_USERNAME:cleanops}
    password: ${CLEANOPS_DB_PASSWORD:cleanops}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${CLEANOPS_SERVER_PORT:8080}

